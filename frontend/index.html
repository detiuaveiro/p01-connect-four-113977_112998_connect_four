<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Connect Four AI Arena</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <div id="ui-layer">
            <div id="message-overlay" class="hidden">
                <h1 id="game-message">Winner!</h1>
            </div>
            <div class="panel">
                <h1>AI Connect Four</h1>
                <div class="status-box p1">
                    <h3 id="p1-status">Player 1 (Red): Waiting...</h3>
                    <p>Score: <span id="p1-score">0</span></p>
                </div>
                <div class="status-box p2">
                    <h3 id="p2-status">Player 2 (Yellow): Waiting...</h3>
                    <p>Score: <span id="p2-score">0</span></p>
                </div>
                <h2 id="turn-indicator" style="margin-top: 20px">
                    Waiting for agents...
                </h2>
            </div>
        </div>

        <div id="canvas-container">
            <div class="view-panel">
                <canvas id="sim-canvas" width="700" height="600"></canvas>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
